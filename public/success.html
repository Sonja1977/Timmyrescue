<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zahlung erfolgreich – Rette Timmy! 🐋</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#040d1a;color:#e8f0fe;font-family:'Nunito',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(52,211,153,0.08) 0%,transparent 70%);pointer-events:none}
.card{max-width:440px;width:100%;text-align:center;position:relative;z-index:1}
.emoji{font-size:64px;margin-bottom:16px;animation:pop .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pop{from{transform:scale(0) rotate(-15deg)}to{transform:scale(1) rotate(0)}}
h1{font-family:'Playfair Display',serif;font-size:34px;font-weight:900;margin-bottom:10px;color:#34d399}
.sub{font-size:15px;color:rgba(200,220,255,0.6);line-height:1.6;margin-bottom:32px}
.btn{
  display:block;width:100%;padding:18px;
  background:linear-gradient(135deg,#059669,#047857);
  color:#fff;font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;
  border:none;border-radius:14px;cursor:pointer;text-decoration:none;
  box-shadow:0 8px 32px rgba(5,150,105,.4);
  transition:transform .15s,box-shadow .15s;
  margin-bottom:16px;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(5,150,105,.5)}
.hint{font-size:12px;color:rgba(255,255,255,.3)}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:0}
</style>
</head>
<body>
<canvas class="confetti" id="confetti"></canvas>
<div class="card">
  <div class="emoji">🎉</div>
  <h1>Zahlung erfolgreich!</h1>
  <p class="sub">Du hast Zugang zu <strong>Rette Timmy!</strong><br>Klicke jetzt und rette den Buckelwal. Viel Erfolg! 🐋</p>
  <a href="/play.html" class="btn">🐋 Jetzt spielen</a>
  <p class="hint">Der Zugang ist in deinem Browser gespeichert.</p>
</div>

<script>
// Confetti
const cv=document.getElementById('confetti'),ctx=cv.getContext('2d');
cv.width=window.innerWidth;cv.height=window.innerHeight;
const cols=['#34d399','#fbbf24','#f87171','#60a5fa','#a78bfa','#fb923c'];
const pieces=Array.from({length:120},()=>({
  x:Math.random()*cv.width,y:-10-Math.random()*100,
  vx:(Math.random()-.5)*3,vy:2+Math.random()*3,
  r:4+Math.random()*6,col:cols[Math.floor(Math.random()*cols.length)],
  rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.15,life:1
}));
function animConf(){
  ctx.clearRect(0,0,cv.width,cv.height);
  pieces.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.vy+=.05;
    if(p.y>cv.height+10)p.y=-10;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.fillStyle=p.col;ctx.globalAlpha=.85;
    ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();
  });
  requestAnimationFrame(animConf);
}
animConf();

// Store access token
const params=new URLSearchParams(window.location.search);
const session=params.get('session_id');
if(session){localStorage.setItem('timmy_access',session);}
</script>
</body>
</html>
